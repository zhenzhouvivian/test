<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI空间生成 · 原型 v3</title>
  <style>
    :root {
      --bg:     #1b1b1d;
      --border: rgba(255,255,255,.18);
      --muted:  rgba(255,255,255,.5);
      --accent: rgba(255,255,255,.07);
      --cta:    #3b82f6;
      --cta-h:  #2563eb;
      --font:   'Poppins', Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

    /* nav */
    .topnav { height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; }
    .logo svg { width: 24px; height: 24px; }

    /* layout */
    .app { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 152px; flex-shrink: 0; padding: 14px 10px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: 8px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all .15s; }
    .nav-item:hover { background: var(--accent); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,.1); color: #fff; }
    .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .sidebar-foot { margin-top: auto; padding: 10px 12px; font-size: 11px; color: rgba(255,255,255,.3); display: flex; flex-direction: column; gap: 6px; }
    .plan-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 600; background: rgba(255,255,255,.1); color: rgba(255,255,255,.6); margin-left: 3px; }

    /* main */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 36px 24px 48px; }
    .hero { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 28px; }
    .hero em { font-style: normal; background: linear-gradient(90deg,#60a5fa,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* card */
    .card { width: 100%; max-width: 820px; background: rgba(255,255,255,.035); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }

    /* parent tabs */
    .ptabs { display: flex; border-bottom: 1px solid var(--border); }
    .ptab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px; padding: 14px 10px; cursor: pointer; border-bottom: 2px solid transparent; font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s; }
    .ptab:hover { color: #fff; background: rgba(255,255,255,.03); }
    .ptab.active { color: #fff; border-bottom-color: var(--cta); background: rgba(59,130,246,.05); }
    .ptab-icon { width: 30px; height: 30px; border-radius: 4px; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; }
    .ptab.active .ptab-icon { background: rgba(59,130,246,.2); }
    .ptab-text { line-height: 1.25; }
    .ptab-name { font-size: 13px; font-weight: 600; }
    .ptab-sub { font-size: 10px; color: rgba(255,255,255,.35); }

    /* ============================================================
       Unified input box
       ============================================================ */
    .input-wrap { padding: 16px 20px 14px; }

    .input-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.03);
      transition: border-color .15s;
      overflow: hidden;
    }
    .input-box:focus-within { border-color: rgba(59,130,246,.5); }

    /* Top: image thumbnails + textarea in one row */
    .input-body {
      display: flex;
      align-items: flex-start;
      gap: 0;
      padding: 12px 14px 8px;
      min-height: 90px;
    }

    /* Image slot — compact, inline left */
    .img-slot {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      border-radius: 6px;
      border: 1px dashed rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255,255,255,.04);
      transition: all .15s;
      position: relative;
      margin-right: 12px;
      margin-top: 2px;
    }
    .img-slot:hover { border-color: rgba(255,255,255,.4); background: rgba(255,255,255,.07); }
    .img-slot.has-image { border-style: solid; border-color: rgba(59,130,246,.4); }
    .img-slot svg { color: rgba(255,255,255,.3); }
    .img-preview-thumb {
      position: absolute; inset: 0;
      border-radius: 5px;
      background-size: cover;
      background-position: center;
      display: none;
    }
    .img-preview-thumb.visible { display: block; }
    .img-rm {
      position: absolute; top: -5px; right: -5px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(0,0,0,.8);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 10px; line-height: 1;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2;
    }
    .img-slot.has-image .img-rm { display: flex; }
    .img-slot.has-image > svg { display: none; }

    /* Textarea */
    .prompt-ta {
      flex: 1;
      background: transparent;
      border: none; outline: none; resize: none;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.65;
      min-height: 52px;
      max-height: 200px;
    }
    .prompt-ta::placeholder { color: rgba(255,255,255,.28); }
    .prompt-ta.expanded { font-size: 13px; }

    /* Expand hint below textarea */
    .expand-hint {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 0 14px 8px calc(52px + 12px + 14px);
      font-size: 11px;
      color: rgba(196,181,253,.7);
    }
    .expand-hint.visible { display: flex; }
    .revert-link { color: #a78bfa; cursor: pointer; text-decoration: underline; margin-left: 2px; }

    /* Validation message */
    .validation-msg { display: none; margin: 0 14px 10px; padding: 7px 11px; border-radius: 6px; font-size: 12px; }
    .validation-msg.error { display: flex; align-items: center; gap: 7px; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.22); color: #fca5a5; }

    /* Bottom toolbar */
    .input-toolbar {
      display: flex;
      align-items: center;
      padding: 8px 12px 10px;
      border-top: 1px solid rgba(255,255,255,.07);
      gap: 4px;
    }

    /* Toolbar left buttons */
    .tb-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,.45);
      border: none;
      font-family: var(--font);
      transition: all .15s;
      white-space: nowrap;
    }
    .tb-btn:hover { background: var(--accent); color: rgba(255,255,255,.8); }
    .tb-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* AI expand — slightly distinct */
    .expand-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: rgba(196,181,253,.7);
      border: none;
      font-family: var(--font);
      transition: all .15s;
    }
    .expand-btn:hover { background: rgba(168,85,247,.12); color: #c4b5fd; }
    .expand-btn:disabled { opacity: .3; cursor: default; }
    .expand-btn svg { width: 13px; height: 13px; }
    .expand-btn.loading { pointer-events: none; }

    .tb-divider { width: 1px; height: 14px; background: rgba(255,255,255,.1); margin: 0 2px; flex-shrink: 0; }

    /* Spacer */
    .tb-spacer { flex: 1; }

    /* Char count */
    .char-count { font-size: 11px; color: rgba(255,255,255,.2); margin-right: 8px; }
    .char-count.warn { color: #f59e0b; }

    /* Send/Create button — inside toolbar */
    .send-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--cta);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--cta-h); transform: scale(1.04); }
    .send-btn:disabled { opacity: .35; cursor: default; transform: none; }
    .send-btn svg { width: 15px; height: 15px; color: #fff; }

    /* Checking overlay */
    .checking-overlay {
      position: absolute; inset: 0;
      background: rgba(27,27,29,.82);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; z-index: 50; border-radius: 12px; backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .checking-overlay.visible { opacity: 1; pointer-events: all; }
    .checking-overlay p { font-size: 13px; color: rgba(255,255,255,.7); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; border-radius: 50%; animation: spin .7s linear infinite; }

    /* Demo controls */
    .demo-controls {
      width: 100%; max-width: 820px; margin-top: 20px;
      padding: 14px 16px;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .demo-controls p { font-size: 11px; color: rgba(255,255,255,.3); width: 100%; margin-bottom: 2px; }
    .demo-btn { padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.05); color: rgba(255,255,255,.6); font-family: var(--font); transition: all .15s; }
    .demo-btn:hover { color: #fff; background: rgba(255,255,255,.1); }

    /* toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: rgba(28,28,30,.97); border: 1px solid rgba(255,255,255,.12); border-radius: 8px; padding: 9px 16px; font-size: 12px; backdrop-filter: blur(12px); transition: transform .25s ease; z-index: 9999; color: #5eead4; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <polygon points="12,2 22,20 2,20" fill="#3b82f6" opacity=".9"/>
      <polygon points="12,7 20,20 4,20" fill="#1b1b1d"/>
      <circle cx="12" cy="14.5" r="2.5" fill="#60a5fa"/>
    </svg>
    AHOLO
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div class="nav-item active">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg>
      创建
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="6" height="8" rx="1"/><rect x="9" y="2" width="6" height="12" rx="1"/></svg>
      项目
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2.5"/></svg>
      社区
    </div>
    <div class="sidebar-foot">
      <div>⬡ 55732 积分</div>
      <div>186*xBsd<span class="plan-tag">Free</span></div>
    </div>
  </aside>

  <main class="main">
    <h1 class="hero"><em>高保真复刻</em>真实的3D物体及空间</h1>

    <div class="card">
      <!-- Checking overlay -->
      <div class="checking-overlay" id="overlay">
        <div class="spin" style="width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;"></div>
        <p id="overlay-text">内容合法性检测中…</p>
      </div>

      <!-- Tabs -->
      <div class="ptabs">
        <div class="ptab" onclick="toast('物体重建（演示）')">
          <div class="ptab-icon"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2L18 7L18 13L10 18L2 13L2 7Z"/></svg></div>
          <div class="ptab-text"><div class="ptab-name">物体</div><div class="ptab-sub">物体-3DGS重建</div></div>
        </div>
        <div class="ptab" onclick="toast('空间重建（演示）')">
          <div class="ptab-icon"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 15L10 5L18 15"/><rect x="5" y="10" width="10" height="5"/></svg></div>
          <div class="ptab-text"><div class="ptab-name">空间</div><div class="ptab-sub">空间-3DGS重建</div></div>
        </div>
        <div class="ptab active">
          <div class="ptab-icon"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="M7 10Q10 6 13 10Q10 14 7 10"/></svg></div>
          <div class="ptab-text"><div class="ptab-name">AI空间生成</div><div class="ptab-sub">图文生成三维空间</div></div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-wrap">
        <div class="input-box">

          <!-- Body: image slot + textarea -->
          <div class="input-body">
            <!-- [交互说明] 点击 + 上传图片，上传后显示缩略图，悬停显示删除 -->
            <div class="img-slot" id="img-slot" onclick="handleImgClick()">
              <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImgSelect(event)">
              <div class="img-preview-thumb" id="img-thumb"></div>
              <button class="img-rm" id="img-rm" onclick="removeImg(event)">×</button>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
                <line x1="9" y1="4" x2="9" y2="14"/><line x1="4" y1="9" x2="14" y2="9"/>
              </svg>
            </div>

            <!-- [交互说明] 多行文字输入，无自动检测，仅字数统计 -->
            <textarea class="prompt-ta" id="prompt-ta"
              placeholder="输入文字或上传参考图，仅支持室内空间生成"
              oninput="onInput()"></textarea>
          </div>

          <!-- Expand hint (after AI expand) -->
          <div class="expand-hint" id="expand-hint">
            <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#a78bfa" stroke-width="1.4"><polygon points="7,1 8.5,5 13,5 9.5,7.5 11,12 7,9 3,12 4.5,7.5 1,5 5.5,5"/></svg>
            已由 AI 扩写优化
            <span class="revert-link" onclick="revertExpand()">撤销</span>
          </div>

          <!-- Validation error message -->
          <div class="validation-msg" id="validation-msg">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="6"/><line x1="7" y1="4" x2="7" y2="8"/><circle cx="7" cy="10" r=".5" fill="currentColor"/></svg>
            <span id="validation-text"></span>
          </div>

          <!-- Bottom toolbar -->
          <div class="input-toolbar">
            <!-- Autofill -->
            <button class="tb-btn" onclick="triggerAutofill()">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M7 1L8 4.5L11.5 7L8 9.5L7 13L6 9.5L2.5 7L6 4.5Z"/></svg>
              自动填写
            </button>

            <div class="tb-divider"></div>

            <!-- AI Expand -->
            <!-- [交互说明] 有文字时可用；点击先做合法检测，通过后调 Dify 流式扩写 -->
            <button class="expand-btn" id="expand-btn" disabled onclick="triggerExpand()">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><polygon points="7,1 8.5,5 13,5 9.5,7.5 11,12 7,9 3,12 4.5,7.5 1,5 5.5,5"/></svg>
              <span id="expand-label">AI 扩写</span>
            </button>

            <div class="tb-spacer"></div>

            <span class="char-count" id="char-count"></span>

            <!-- Send/Create -->
            <!-- [交互说明] 有图片或文字时激活；点击触发合法检测后提交 -->
            <button class="send-btn" id="send-btn" disabled onclick="handleCreate()">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="13" x2="8" y2="3"/>
                <polyline points="4,7 8,3 12,7"/>
              </svg>
            </button>
          </div>

        </div>
      </div>

    </div><!-- /card -->

    <!-- Demo Controls -->
    <div class="demo-controls">
      <p>演示快捷操作（模拟各状态）</p>
      <button class="demo-btn" onclick="demo('typing')">① 输入文字</button>
      <button class="demo-btn" onclick="demo('checking')">② 检测中（点创建触发）</button>
      <button class="demo-btn" onclick="demo('error')">③ 内容违规</button>
      <button class="demo-btn" onclick="demo('expanding')">④ 扩写中</button>
      <button class="demo-btn" onclick="demo('expanded')">⑤ 扩写完成</button>
      <button class="demo-btn" onclick="demo('image')">⑥ 上传图片</button>
      <button class="demo-btn" onclick="demo('both')">⑦ 图片+文字</button>
      <button class="demo-btn" onclick="demo('reset')">↺ 重置</button>
    </div>

  </main>
</div>
<div class="toast" id="toast"></div>

<script>
  const S = { text: '', originalText: '', imgFile: null, expandState: 'idle' };
  const BANNED = ['outdoor','室外','sky','天空盒','户外','exterior'];
  const AUTOFILL = '一间温馨明亮的北欧风客厅，木质地板，白色墙面，大落地窗，自然光充足，简约家具，绿植点缀';
  const EXPANDED = `The scene is a cozy and serene living room with a rustic yet refined aesthetic, presented in a realistic style. The overall tone is peaceful and inviting, emphasizing natural light and organic textures. The room's focal point is a large window overlooking a verdant, sun-drenched field with distant hills, creating an open and airy feel. A light-colored sofa is positioned against the wall opposite the window, adorned with various throw pillows in soft, earthy tones and a light blanket draped over one arm. In the center of the room, a circular wooden coffee table holds a vase of white flowers, a tray with small items, and a book, resting on a textured cream-colored rug that covers most of the hardwood floor.`;

  function onInput() {
    const ta = document.getElementById('prompt-ta');
    S.text = ta.value;
    // If user edits after expand, clear hint
    if (S.expandState === 'done') {
      S.expandState = 'idle';
      document.getElementById('expand-hint').classList.remove('visible');
      ta.classList.remove('expanded');
    }
    clearValidation();
    updateCharCount();
    updateButtons();
  }

  function updateCharCount() {
    const len = S.text.length;
    const el = document.getElementById('char-count');
    if (len > 0) {
      el.textContent = len + ' / 500';
      el.classList.toggle('warn', len > 450);
    } else {
      el.textContent = '';
    }
  }

  function updateButtons() {
    const hasInput = S.text.length > 0 || S.imgFile;
    document.getElementById('send-btn').disabled = !hasInput;
    document.getElementById('expand-btn').disabled = S.text.length < 5;
  }

  /* ---- Validation ---- */
  function checkContent(text) {
    return !BANNED.some(w => text.toLowerCase().includes(w));
  }

  function showValidationError(msg) {
    const el = document.getElementById('validation-msg');
    el.classList.add('error');
    document.getElementById('validation-text').textContent = msg;
  }

  function clearValidation() {
    document.getElementById('validation-msg').className = 'validation-msg';
  }

  /* ---- Overlay ---- */
  function showOverlay(msg) {
    document.getElementById('overlay-text').textContent = msg;
    document.getElementById('overlay').classList.add('visible');
  }
  function hideOverlay() {
    document.getElementById('overlay').classList.remove('visible');
  }

  /* ---- Create ---- */
  function handleCreate() {
    clearValidation();
    if (!S.text) { submitTask(); return; }  // image only, skip check
    showOverlay('内容合法性检测中…');
    setTimeout(() => {
      const ok = checkContent(S.text);
      hideOverlay();
      if (ok) { submitTask(); }
      else { showValidationError('描述包含不支持的内容（当前仅支持室内场景），请修改后重试'); }
    }, 900);
  }

  function submitTask() { toast('任务已提交 · AI空间生成中'); }

  /* ---- AI Expand ---- */
  function triggerExpand() {
    if (S.text.length < 5) return;
    clearValidation();
    showOverlay('内容合法性检测中…');
    setTimeout(() => {
      const ok = checkContent(S.text);
      hideOverlay();
      if (!ok) { showValidationError('描述包含不支持的内容，请修改后再扩写'); return; }
      doExpand();
    }, 800);
  }

  function doExpand() {
    S.originalText = S.text;
    S.expandState = 'loading';
    const btn = document.getElementById('expand-btn');
    const label = document.getElementById('expand-label');
    btn.classList.add('loading');
    label.innerHTML = '<span class="spin" style="width:10px;height:10px;border:1.5px solid rgba(196,181,253,.3);border-top-color:#c4b5fd;margin-right:4px;vertical-align:middle;"></span>扩写中…';
    btn.disabled = true;

    const ta = document.getElementById('prompt-ta');
    ta.value = '';
    ta.classList.add('expanded');
    S.text = '';

    let i = 0;
    const chars = EXPANDED.split('');
    const iv = setInterval(() => {
      if (i < chars.length) { ta.value += chars[i++]; ta.scrollTop = ta.scrollHeight; }
      else { clearInterval(iv); finishExpand(); }
    }, 14);
  }

  function finishExpand() {
    S.text = EXPANDED;
    S.expandState = 'done';
    const btn = document.getElementById('expand-btn');
    btn.classList.remove('loading');
    document.getElementById('expand-label').textContent = '重新扩写';
    btn.disabled = false;
    document.getElementById('expand-hint').classList.add('visible');
    updateCharCount();
    updateButtons();
  }

  function revertExpand() {
    const ta = document.getElementById('prompt-ta');
    ta.value = S.originalText;
    ta.classList.remove('expanded');
    S.text = S.originalText;
    S.expandState = 'idle';
    document.getElementById('expand-hint').classList.remove('visible');
    document.getElementById('expand-label').textContent = 'AI 扩写';
    clearValidation();
    updateCharCount();
    updateButtons();
  }

  /* ---- Image ---- */
  function handleImgClick() {
    if (S.imgFile) return;
    document.getElementById('img-input').click();
  }
  function handleImgSelect(e) {
    const f = e.target.files[0];
    if (!f) return;
    S.imgFile = f;
    const thumb = document.getElementById('img-thumb');
    thumb.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
    thumb.classList.add('visible');
    document.getElementById('img-slot').classList.add('has-image');
    updateButtons();
  }
  function removeImg(e) {
    e.stopPropagation();
    S.imgFile = null;
    const thumb = document.getElementById('img-thumb');
    thumb.style.backgroundImage = '';
    thumb.classList.remove('visible');
    document.getElementById('img-slot').classList.remove('has-image');
    document.getElementById('img-input').value = '';
    updateButtons();
  }

  /* ---- Autofill ---- */
  function triggerAutofill() {
    const ta = document.getElementById('prompt-ta');
    ta.value = AUTOFILL; S.text = AUTOFILL;
    S.expandState = 'idle';
    document.getElementById('expand-hint').classList.remove('visible');
    ta.classList.remove('expanded');
    document.getElementById('expand-label').textContent = 'AI 扩写';
    clearValidation();
    updateCharCount(); updateButtons();
    ta.focus();
  }

  /* ---- Demo ---- */
  function demo(s) {
    const ta = document.getElementById('prompt-ta');
    if (s === 'reset') {
      ta.value = ''; S.text = ''; S.imgFile = null; S.expandState = 'idle';
      document.getElementById('img-thumb').classList.remove('visible');
      document.getElementById('img-slot').classList.remove('has-image');
      document.getElementById('img-input').value = '';
      document.getElementById('expand-hint').classList.remove('visible');
      document.getElementById('expand-label').textContent = 'AI 扩写';
      ta.classList.remove('expanded');
      clearValidation(); updateCharCount(); updateButtons();
    } else if (s === 'typing') {
      ta.value = '一间温馨的北欧客厅'; S.text = ta.value;
      clearValidation(); updateCharCount(); updateButtons();
    } else if (s === 'checking') {
      ta.value = '一间温馨的北欧客厅'; S.text = ta.value;
      updateCharCount(); updateButtons();
      showOverlay('内容合法性检测中…');
      setTimeout(hideOverlay, 2000);
    } else if (s === 'error') {
      ta.value = '一间室外庭院 outdoor'; S.text = ta.value;
      clearValidation();
      showValidationError('描述包含不支持的内容（当前仅支持室内场景），请修改后重试');
      updateCharCount(); updateButtons();
    } else if (s === 'expanding') {
      ta.value = '一间温馨的北欧客厅'; S.text = ta.value; S.originalText = ta.value;
      S.expandState = 'loading';
      const btn = document.getElementById('expand-btn');
      btn.classList.add('loading');
      document.getElementById('expand-label').innerHTML = '<span class="spin" style="width:10px;height:10px;border:1.5px solid rgba(196,181,253,.3);border-top-color:#c4b5fd;margin-right:4px;vertical-align:middle;"></span>扩写中…';
      btn.disabled = true;
      ta.value = ''; ta.classList.add('expanded'); S.text = '';
      clearValidation(); updateCharCount(); updateButtons();
    } else if (s === 'expanded') {
      ta.value = EXPANDED; S.text = EXPANDED; S.expandState = 'done'; S.originalText = '一间温馨的北欧客厅';
      ta.classList.add('expanded');
      const btn = document.getElementById('expand-btn');
      btn.classList.remove('loading');
      document.getElementById('expand-label').textContent = '重新扩写';
      btn.disabled = false;
      document.getElementById('expand-hint').classList.add('visible');
      clearValidation(); updateCharCount(); updateButtons();
    } else if (s === 'image') {
      S.imgFile = { name: 'room.jpg' };
      const thumb = document.getElementById('img-thumb');
      thumb.style.backgroundImage = 'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)';
      thumb.classList.add('visible');
      document.getElementById('img-slot').classList.add('has-image');
      updateButtons();
    } else if (s === 'both') {
      demo('image');
      ta.value = '参考图的风格，更现代一些'; S.text = ta.value;
      clearValidation(); updateCharCount(); updateButtons();
    }
  }

  /* ---- Toast ---- */
  let tt;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2500);
  }

  updateButtons();
</script>
</body>
</html>
